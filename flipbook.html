<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Mobile Flipbook — 2026-04-27 (100 銘柄)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #484f58;
      --accent: #58a6ff;
      --green: #3fb950;
      --green-bg: rgba(63,185,80,.15);
      --amber: #d29922;
      --amber-bg: rgba(210,153,34,.15);
      --gray-b: #484f58;
      --gray-bg: rgba(72,79,88,.3);
      --tag-bg: rgba(56,139,253,.15);
      --tag-c: #58a6ff;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: pan-y;
    }

    #wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      padding: 10px 14px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .counter {
      color: var(--text2);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      min-width: 60px;
    }
    .ticker {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .price-tag {
      margin-left: auto;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .name-row {
      font-size: 0.75rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sector-row {
      font-size: 0.7rem;
      color: var(--text3);
      margin-bottom: 4px;
    }
    .themes {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }
    .theme-badge {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--tag-c);
      font-weight: 500;
    }

    /* ── Scores row ────────────────────────────────────────── */
    .scores-row {
      display: flex;
      gap: 6px;
      margin-bottom: 2px;
    }
    .score-pill {
      flex: 1;
      text-align: center;
      padding: 4px 2px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .score-high { background: var(--green-bg); color: var(--green); }
    .score-mid  { background: var(--amber-bg); color: var(--amber); }
    .score-low  { background: var(--gray-bg); color: var(--gray-b); }

    /* ── Chart stage ───────────────────────────────────────── */
    #stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      overflow: hidden;
      position: relative;
    }
    #chart {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      transition: opacity 0.15s ease;
    }
    #chart.loading { opacity: 0.4; }

    /* Tap zones overlay (invisible) */
    .tap-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 35%;
      z-index: 10;
      /* debug: background: rgba(255,0,0,0.1); */
    }
    .tap-zone.left { left: 0; }
    .tap-zone.right { right: 0; }

    /* Swipe indicator */
    .swipe-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .swipe-indicator.left { left: 12px; }
    .swipe-indicator.right { right: 12px; }
    .swipe-indicator.show { opacity: 1; }

    /* ── Footer toolbar ────────────────────────────────────── */
    #footer {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .footer-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--tag-c);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .footer-btn:active {
      background: var(--accent);
      color: #fff;
      transform: scale(0.95);
    }

    /* ── Search overlay ────────────────────────────────────── */
    #searchOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: none;
      flex-direction: column;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    #searchOverlay.show { display: flex; }
    #searchOverlay input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 10px;
    }
    #searchOverlay input:focus { border-color: var(--accent); }
    .search-results {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .search-result {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .search-result:active { background: var(--accent); color: #fff; }
    .search-result .sr-ticker { font-weight: 700; color: var(--accent); }
    .search-result .sr-name { color: var(--text2); font-size: 0.8rem; margin-left: 8px; }
    .search-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text);
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Progress bar ──────────────────────────────────────── */
    #progressBar {
      height: 2px;
      background: var(--accent);
      transition: width 0.2s ease;
      position: absolute;
      bottom: 0;
      left: 0;
    }
    #header { position: relative; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <div class="header-top">
      <span class="counter" id="counter">— / —</span>
      <span class="ticker" id="ticker">—</span>
      <span class="price-tag" id="price"></span>
    </div>
    <div class="name-row" id="name"></div>
    <div class="sector-row" id="sector"></div>
    <div class="themes" id="themes"></div>
    <div class="scores-row" id="scores"></div>
    <div id="progressBar"></div>
  </div>

  <div id="stage">
    <div class="tap-zone left" id="tapLeft"></div>
    <div class="tap-zone right" id="tapRight"></div>
    <span class="swipe-indicator left" id="indLeft">‹</span>
    <span class="swipe-indicator right" id="indRight">›</span>
    <img id="chart" alt="chart">
  </div>

  <div id="footer">
    <a id="tv-btn" class="footer-btn" href="#" target="_blank" rel="noopener">📈 TV</a>
    <button class="footer-btn" id="searchBtn">🔍 検索</button>
    <button class="footer-btn" id="listBtn">📋 一覧</button>
  </div>
</div>

<!-- Search overlay -->
<div id="searchOverlay">
  <button class="search-close" id="searchClose">✕</button>
  <input id="searchInput" type="search" placeholder="🔍 ティッカー / 銘柄名 / 番号" autocomplete="off">
  <div class="search-results" id="searchResults"></div>
</div>

  const TOTAL = META.length;
  let idx = 0;

  const $ = (id) => document.getElementById(id);
  const fmt = (v, d = 2) => (v == null || Number.isNaN(v)) ? "—" : v.toFixed(d);
  const fmtPct = (v) => (v == null || Number.isNaN(v)) ? "—" : (v >= 0 ? "+" : "") + v.toFixed(1) + "%";

  function tvUrl(ticker) {
    return "https://www.tradingview.com/chart/?symbol=" + ticker.replace(/-/g, ".");
  }

  function scoreCls(v, hi, mid) {
    if (v >= hi) return "score-high";
    if (v >= mid) return "score-mid";
    return "score-low";
  }

  function render() {
    if (TOTAL === 0) { $("ticker").textContent = "(empty)"; return; }
    const m = META[idx];
    $("counter").textContent = (idx + 1) + " / " + TOTAL;
    $("ticker").textContent = m.ticker;
    $("price").textContent = m.price != null ? "$" + fmt(m.price) : "";
    $("name").textContent = m.name || "";
    const si = [m.sector, m.industry].filter(Boolean).join(" / ");
    $("sector").textContent = si;
    $("themes").innerHTML = (m.themes || [])
      .map(t => `<span class="theme-badge">${t}</span>`).join("");

    const ss = m.setup_score != null ? Math.round(m.setup_score * 100) : null;
    const ls = m.leading_score != null ? Math.round(m.leading_score * 100) : null;
    const rs = m.rs != null ? Math.round(m.rs * 100) : null;
    $("scores").innerHTML = [
      `<span class="score-pill ${ss != null ? scoreCls(ss, 70, 55) : "score-low"}">Setup ${ss ?? "—"}</span>`,
      `<span class="score-pill ${ls != null ? scoreCls(ls, 75, 55) : "score-low"}">Lead ${ls ?? "—"}</span>`,
      `<span class="score-pill ${rs != null ? scoreCls(rs, 80, 60) : "score-low"}">RS ${rs ?? "—"}</span>`,
    ].join("");

    $("tv-btn").href = tvUrl(m.ticker);

    const img = $("chart");
    img.classList.add("loading");
    img.onload = () => img.classList.remove("loading");
    img.src = m.png + "?v=" + idx;

    // Progress bar
    const pct = ((idx + 1) / TOTAL) * 100;
    $("progressBar").style.width = pct + "%";

    prefetch();
    history.replaceState(null, "", "?i=" + idx);
  }

  function prefetch() {
    for (let d = -2; d <= 2; d++) {
      const j = idx + d;
      if (j < 0 || j >= TOTAL || d === 0) continue;
      new Image().src = META[j].png;
    }
  }

  function goto(i) {
    if (i < 0 || i >= TOTAL) return;
    idx = i;
    render();
  }

  function next() { goto(Math.min(idx + 1, TOTAL - 1)); }
  function prev() { goto(Math.max(idx - 1, 0)); }

  // ── Swipe detection ───────────────────────────────────────
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;
  const stage = $("stage");

  stage.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
    touchStartTime = Date.now();
  }, { passive: true });

  stage.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;

    // Only process swipe if it's more horizontal than vertical
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx) * 0.8 || dt > 500) return;

    if (dx < -40) {
      // Swipe left → next
      flashIndicator("right");
      next();
    } else if (dx > 40) {
      // Swipe right → prev
      flashIndicator("left");
      prev();
    }
  }, { passive: true });

  function flashIndicator(side) {
    const el = $(side === "left" ? "indLeft" : "indRight");
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 300);
  }

  // ── Tap zones ─────────────────────────────────────────────
  $("tapLeft").addEventListener("click", (e) => {
    e.stopPropagation();
    flashIndicator("left");
    prev();
  });
  $("tapRight").addEventListener("click", (e) => {
    e.stopPropagation();
    flashIndicator("right");
    next();
  });

  // ── Search ────────────────────────────────────────────────
  const searchOverlay = $("searchOverlay");
  const searchInput = $("searchInput");
  const searchResults = $("searchResults");

  $("searchBtn").addEventListener("click", openSearch);
  $("searchClose").addEventListener("click", closeSearch);

  function openSearch() {
    searchOverlay.classList.add("show");
    searchInput.value = "";
    searchInput.focus();
    renderSearch("");
  }

  function closeSearch() {
    searchOverlay.classList.remove("show");
    searchInput.blur();
  }

  function renderSearch(q) {
    q = q.trim().toUpperCase();
    let matches;
    if (/^\d+$/.test(q)) {
      const n = parseInt(q, 10) - 1;
      matches = (n >= 0 && n < TOTAL) ? [META[n]] : [];
    } else if (!q) {
      matches = META.slice(0, 50);
    } else {
      matches = META.filter(m =>
        m.ticker.toUpperCase().includes(q) ||
        (m.name || "").toUpperCase().includes(q)
      ).slice(0, 50);
    }

    searchResults.innerHTML = matches.map(m =>
      `<div class="search-result" data-i="${m.i}">
         <span class="sr-ticker">${(m.i + 1)}. ${m.ticker}</span>
         <span class="sr-name">${m.name || ""}</span>
       </div>`
    ).join("");

    searchResults.querySelectorAll(".search-result").forEach(el => {
      el.addEventListener("click", () => {
        goto(parseInt(el.dataset.i, 10));
        closeSearch();
      });
    });
  }

  searchInput.addEventListener("input", (e) => renderSearch(e.target.value));

  // ── List mode (jump to Mobile Report if available) ─────────
  $("listBtn").addEventListener("click", () => {
    // Try to navigate to the mobile card report in the same directory
    const mobilePath = "index.html";
    if (mobilePath && mobilePath !== "{{" + "MOBILE_REPORT_PATH" + "}}") {
      window.location.href = mobilePath;
    } else {
      // fallback: open search
      openSearch();
    }
  });

  // ── Keyboard support (for testing on desktop) ─────────────
  document.addEventListener("keydown", (e) => {
    if (searchOverlay.classList.contains("show")) {
      if (e.key === "Escape") closeSearch();
      return;
    }
    switch (e.key) {
      case "ArrowRight": case "l": case " ": next(); e.preventDefault(); break;
      case "ArrowLeft":  case "h":            prev(); e.preventDefault(); break;
      case "g": case "Home":                  goto(0); e.preventDefault(); break;
      case "G": case "End":                   goto(TOTAL - 1); e.preventDefault(); break;
      case "/":                               openSearch(); e.preventDefault(); break;
    }
  });

  // ── Init ──────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const initial = parseInt(params.get("i") || "0", 10);
  if (!Number.isNaN(initial) && initial >= 0 && initial < TOTAL) idx = initial;
  render();
</script>
