<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Mobile Flipbook — 2026-05-15 (100 銘柄)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #484f58;
      --accent: #58a6ff;
      --green: #3fb950;
      --green-bg: rgba(63,185,80,.15);
      --amber: #d29922;
      --amber-bg: rgba(210,153,34,.15);
      --gray-b: #484f58;
      --gray-bg: rgba(72,79,88,.3);
      --tag-bg: rgba(56,139,253,.15);
      --tag-c: #58a6ff;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Noto Sans JP', sans-serif;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    #wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      padding: 10px 14px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .counter {
      color: var(--text2);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      min-width: 60px;
    }
    .ticker {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .price-tag {
      margin-left: auto;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .name-row {
      font-size: 0.75rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sector-row {
      font-size: 0.7rem;
      color: var(--text3);
      margin-bottom: 4px;
    }
    .themes {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }
    .theme-badge {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--tag-c);
      font-weight: 500;
    }

    /* ── Scores row ────────────────────────────────────────── */
    .scores-row {
      display: flex;
      gap: 6px;
      margin-bottom: 2px;
    }
    .score-pill {
      flex: 1;
      text-align: center;
      padding: 4px 2px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .score-high { background: var(--green-bg); color: var(--green); }
    .score-mid  { background: var(--amber-bg); color: var(--amber); }
    .score-low  { background: var(--gray-bg); color: var(--gray-b); }

    /* ── Chart stage ───────────────────────────────────────── */
    #stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      overflow: hidden;
      position: relative;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #chartWrap {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: 0 0;
      will-change: transform;
    }
    #chart {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    #chart.loading { opacity: 0.4; }

    /* Zoom indicator badge */
    .zoom-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }
    .zoom-badge.show { opacity: 1; }

    /* Swipe indicator */
    .swipe-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5;
    }
    .swipe-indicator.left { left: 12px; }
    .swipe-indicator.right { right: 12px; }
    .swipe-indicator.show { opacity: 1; }

    /* ── Footer toolbar ────────────────────────────────────── */
    #footer {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .footer-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 14px;
      border-radius: 10px;
      background: var(--tag-bg);
      color: var(--tag-c);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .footer-btn:active {
      background: var(--accent);
      color: #fff;
      transform: scale(0.95);
    }

    /* ── Search overlay ────────────────────────────────────── */
    #searchOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: none;
      flex-direction: column;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    #searchOverlay.show { display: flex; }
    #searchOverlay input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      margin-bottom: 10px;
    }
    #searchOverlay input:focus { border-color: var(--accent); }
    .search-results {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .search-result {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .search-result:active { background: var(--accent); color: #fff; }
    .search-result .sr-ticker { font-weight: 700; color: var(--accent); }
    .search-result .sr-name { color: var(--text2); font-size: 0.8rem; margin-left: 8px; }
    .search-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text);
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Progress bar ──────────────────────────────────────── */
    #progressBar {
      height: 2px;
      background: var(--accent);
      transition: width 0.2s ease;
      position: absolute;
      bottom: 0;
      left: 0;
    }
    #header { position: relative; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <div class="header-top">
      <span class="counter" id="counter">— / —</span>
      <span class="ticker" id="ticker">—</span>
      <span class="price-tag" id="price"></span>
    </div>
    <div class="name-row" id="name"></div>
    <div class="sector-row" id="sector"></div>
    <div class="themes" id="themes"></div>
    <div class="scores-row" id="scores"></div>
    <div id="progressBar"></div>
  </div>

  <div id="stage">
    <span class="swipe-indicator left" id="indLeft">‹</span>
    <span class="swipe-indicator right" id="indRight">›</span>
    <span class="zoom-badge" id="zoomBadge">1.0x</span>
    <div id="chartWrap">
      <img id="chart" alt="chart">
    </div>
  </div>

  <div id="footer">
    <a id="tv-btn" class="footer-btn" href="#" target="_blank" rel="noopener">📈 TV</a>
    <button class="footer-btn" id="stageboardBtn">D登録</button>
    <button class="footer-btn" id="searchBtn">🔍 検索</button>
    <button class="footer-btn" id="listBtn">📋 一覧</button>
  </div>
</div>

<!-- Search overlay -->
<div id="searchOverlay">
  <button class="search-close" id="searchClose">✕</button>
  <input id="searchInput" type="search" placeholder="🔍 ティッカー / 銘柄名 / 番号" autocomplete="off">
  <div class="search-results" id="searchResults"></div>
</div>
